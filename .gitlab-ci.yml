deploy:n8n:
  stage: deploy
  image: python:3.11
  before_script:
    - pip install --no-cache-dir requests
  script:
    - export N8N_BASE_URL="$N8N_BASE_URL"
    - export N8N_API_KEY="$N8N_API_KEY"
    - export VERCEL_API_URL="$VERCEL_API_URL"
    - export VERCEL_API_SECRET="$VERCEL_API_SECRET"
    - python scripts/deploy_n8n_workflow.py n8n/workflows/orchestrator-iterate.json
  only:
    - main
  when: on_success