stages:
  - test
  - lint
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: pip-default
  paths:
    - .cache/pip

test:
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.10", "3.11", "3.12"]
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install --upgrade pip
    - pip install --no-cache-dir -r requirements.txt -e ".[dev]"
  script:
    - pytest --cov=src --cov-report=xml
  coverage: /(?i)total.*?(\d+\.?\d+)%/
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

lint:
  stage: lint
  image: python:3.10
  before_script:
    - pip install --upgrade pip
    - pip install --no-cache-dir black==26.3.1 isort==5.12.0 flake8==6.1.0 pyflakes==3.1.0
  script:
    - black --check src/ tests/
    - isort --check-only src/ tests/
    - flake8 --max-line-length=100 --extend-ignore=E203,W503 src/ tests/

build:
  stage: build
  image: python:3.11
  before_script:
    - pip install --upgrade pip
    - pip install --no-cache-dir build
  script:
    - python -m build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day
  only:
    - main
    - develop
    - tags

deploy:vercel:
  stage: deploy
  image: node:20
  before_script:
    - npm install -g vercel@latest
  script:
    - vercel --prod --yes --token=$VERCEL_TOKEN
  environment:
    name: production
    url: $CI_ENVIRONMENT_URL
  only:
    - main
    - tags
  when: on_success

