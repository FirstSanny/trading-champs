stages:
  - test
  - lint
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: "${CI_COMMIT_REF_SLUG}-pip"
  paths:
    - .cache/pip

test:
  stage: test
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.10", "3.11", "3.12"]
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install --upgrade pip
    - pip install --no-cache-dir -r requirements.txt
    - pip install --no-cache-dir -e ".[dev]"
  script:
    - python -c "import sys; print(sys.path)"
    - python -c "import trading_champs; print('OK:', trading_champs.__file__)"
    - ls -la src/trading_champs/
    - pytest --cov=src --cov-report=xml
  coverage: /(?i)total.*?(\d+\.?\d+)%/
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

lint:setup-python:
  stage: lint
  image: python:3.10
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install black==23.7.0 isort==5.12.0 flake8==6.1.0
  script:
    - black --check src/ tests/
  allow_failure: false

lint:isort:
  stage: lint
  image: python:3.10
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install black==23.7.0 isort==5.12.0 flake8==6.1.0
  script:
    - isort --check-only src/ tests/
  allow_failure: false

lint:flake8:
  stage: lint
  image: python:3.10
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install black==23.7.0 isort==5.12.0 flake8==6.1.0
  script:
    - flake8 --max-line-length=100 --extend-ignore=E203,W503 src/ tests/
  allow_failure: false

build:
  stage: build
  image: python:3.11
  before_script:
    - pip install --upgrade pip
    - pip install build
  script:
    - python -m build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day
  only:
    - main
    - develop
    - tags

deploy:vercel:
  stage: deploy
  image: node:20
  before_script:
    - npm install -g vercel
  script:
    - vercel --prod --yes --token=$VERCEL_TOKEN
  environment:
    name: production
    url: $CI_ENVIRONMENT_URL
  only:
    - main
    - tags
  when: on_success
