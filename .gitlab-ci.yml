stages:
  - test
  - lint
  - build
  - pre-deploy
  - deploy

variables:
  GIT_DEPTH: 0  # full clone so seed script always has latest commits
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: ${CI_COMMIT_REF_SLUG}-pip
  paths:
    - .cache/pip

test:
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.10", "3.11", "3.12"]
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install --upgrade pip
    - pip install --no-cache-dir -r requirements.txt -e ".[dev]"
  script:
    - pytest --cov=src --cov-report=xml
  coverage: /(?i)total.*?(\d+\.?\d+)%/
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

lint:
  stage: lint
  image: python:3.10
  before_script:
    - pip install --upgrade pip
    - pip install --no-cache-dir black==26.3.1 isort==5.12.0 flake8==6.1.0 pyflakes==3.1.0
  script:
    - black --check src/ tests/
    - isort --check-only src/ tests/
    - flake8 --max-line-length=100 --extend-ignore=E203,W503 src/ tests/

build:
  stage: build
  image: python:3.11
  before_script:
    - pip install --upgrade pip
    - pip install --no-cache-dir build
  script:
    - python -m build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_TAG'

database-migrate:
  stage: pre-deploy
  image: python:3.11
  needs:
    - job: build
      optional: true
  before_script:
    - pip install --no-cache-dir requests
  script:
    - python scripts/run_migrations.py
  variables:
    SUPABASE_URL: $SUPABASE_URL
    SUPABASE_SERVICE_KEY: $SUPABASE_SERVICE_KEY
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_TAG'
  when: on_success

deploy:vercel:
  stage: deploy
  image: node:20
  needs:
    - job: build
      optional: true
    - job: database-migrate
      optional: true
  before_script:
    - npm install -g vercel@53.3.0
  script:
    - vercel --prod --yes --token=$VERCEL_TOKEN
  environment:
    name: production
    url: $CI_ENVIRONMENT_URL
  only:
    - main
    - tags
  when: on_success

seed-watchlist:
  stage: deploy
  image: python:3.11
  needs:
    - job: deploy:vercel
  before_script:
    - pip install --no-cache-dir requests
  script:
    - python scripts/seed_watchlist_api.py $CI_ENVIRONMENT_URL $VERCEL_API_SECRET $SUPABASE_SERVICE_KEY
  variables:
    SUPABASE_URL: $SUPABASE_URL
    SUPABASE_SERVICE_KEY: $SUPABASE_SERVICE_KEY
  only:
    - main
    - tags
  when: on_success

deploy:n8n:
  stage: deploy
  image: python:3.11
  before_script:
    - pip install --no-cache-dir requests
  script:
    - python scripts/deploy_n8n_workflow.py n8n/workflows/orchestrator-iterate.json
  only:
    - main
  when: on_success